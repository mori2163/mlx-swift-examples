name: iOS IPA Build

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "ビルド対象の ref（branch / tag / commit）"
        required: true
        default: "376bf12bb55bfdc11d722ee0213f3bbfa9095b26"
      scheme:
        description: "iOS アプリ Scheme"
        required: true
        type: choice
        default: "LLMEval"
        options:
          - LLMEval
          - MLXChatExample
          - StableDiffusionExample
          - MNISTTrainer
          - LoRATrainingExample
          - LLMBasic
      configuration:
        description: "ビルド設定"
        required: true
        type: choice
        default: "Release"
        options:
          - Release
          - Debug

permissions:
  contents: read

concurrency:
  group: ios-ipa-${{ github.ref }}-${{ inputs.scheme }}
  cancel-in-progress: true

jobs:
  build_unsigned_ipa:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          ref: ${{ inputs.git_ref }}

      - name: Align Xcode package reference to Prism fork
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          from pathlib import Path
          import sys

          pbxproj = Path("mlx-swift-examples.xcodeproj/project.pbxproj")
          text = pbxproj.read_text(encoding="utf-8")

          anchor = '/* XCRemoteSwiftPackageReference "mlx-swift" */ = {'
          anchor_index = text.find(anchor)
          if anchor_index == -1:
              print("project.pbxproj から mlx-swift の package reference を見つけられませんでした。", file=sys.stderr)
              sys.exit(1)

          line_start = text.rfind("\n", 0, anchor_index) + 1
          line_end = text.find("\n", line_start)
          header_line = text[line_start:line_end]

          open_brace = text.find("{", anchor_index)
          if open_brace == -1:
              print("mlx-swift package reference block の開始 '{' を見つけられませんでした。", file=sys.stderr)
              sys.exit(1)

          depth = 0
          block_end = -1
          for i in range(open_brace, len(text)):
              ch = text[i]
              if ch == "{":
                  depth += 1
              elif ch == "}":
                  depth -= 1
                  if depth == 0:
                      block_end = i
                      break

          if block_end == -1:
              print("mlx-swift package reference block の終了 '}' を見つけられませんでした。", file=sys.stderr)
              sys.exit(1)

          new_block = "\n".join([
              header_line,
              "\t\t\tisa = XCRemoteSwiftPackageReference;",
              "\t\t\trepositoryURL = \"https://github.com/PrismML-Eng/mlx-swift.git\";",
              "\t\t\trequirement = {",
              "\t\t\t\tbranch = prism;",
              "\t\t\t\tkind = branch;",
              "\t\t\t};",
              "\t\t}",
          ])

          updated = text[:line_start] + new_block + text[block_end + 1:]
          pbxproj.write_text(updated, encoding="utf-8")
          print("project.pbxproj の mlx-swift 参照を Prism fork / branch=prism に整合しました。")
          PY

          grep -n 'XCRemoteSwiftPackageReference "mlx-swift"\|repositoryURL = "https://github.com/PrismML-Eng/mlx-swift.git"\|branch = prism;' mlx-swift-examples.xcodeproj/project.pbxproj

      - name: Verify Prism dependency declarations
        shell: bash
        run: |
          set -euo pipefail

          if ! grep -q 'https://github.com/PrismML-Eng/mlx-swift.git' Package.swift; then
            echo "Package.swift に Prism fork 依存が見つかりません。"
            echo "期待: .package(url: \"https://github.com/PrismML-Eng/mlx-swift.git\", branch: \"prism\")"
            exit 1
          fi

          if ! grep -q 'branch: "prism"' Package.swift; then
            echo "Package.swift に branch: \"prism\" が見つかりません。"
            exit 1
          fi

          if ! grep -q 'repositoryURL = "https://github.com/PrismML-Eng/mlx-swift.git"' mlx-swift-examples.xcodeproj/project.pbxproj; then
            echo "project.pbxproj の mlx-swift repositoryURL が Prism fork ではありません。"
            exit 1
          fi

          if ! grep -q 'branch = prism;' mlx-swift-examples.xcodeproj/project.pbxproj; then
            echo "project.pbxproj の mlx-swift requirement が branch=prism ではありません。"
            exit 1
          fi

          echo "Package.swift と project.pbxproj の mlx-swift 依存が Prism fork / prism branch であることを確認しました。"

      - name: Show build environment
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild -version
          swift --version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Resolve package dependencies
        shell: bash
        env:
          SCHEME: ${{ inputs.scheme }}
        run: |
          set -euo pipefail

          DERIVED_DATA="${RUNNER_TEMP}/DerivedData"
          SOURCE_PACKAGES="${RUNNER_TEMP}/SourcePackages"
          PACKAGE_CACHE="${RUNNER_TEMP}/PackageCache"

          clean_spm_state() {
            rm -rf "${DERIVED_DATA}" "${SOURCE_PACKAGES}" "${PACKAGE_CACHE}"
            rm -rf "${HOME}/Library/Developer/Xcode/DerivedData/SourcePackages"
            rm -rf "${HOME}/Library/Caches/org.swift.swiftpm"
            rm -rf "${HOME}/.swiftpm/cache" "${HOME}/.swiftpm/repositories"
            find . -name Package.resolved -delete
          }

          resolve_cmd=(
            xcodebuild
            -resolvePackageDependencies
            -project mlx-swift-examples.xcodeproj
            -scheme "${SCHEME}"
            -derivedDataPath "${DERIVED_DATA}"
            -clonedSourcePackagesDirPath "${SOURCE_PACKAGES}"
            -packageCachePath "${PACKAGE_CACHE}"
            -disablePackageRepositoryCache
          )

          clean_spm_state

          if ! "${resolve_cmd[@]}"; then
            echo "初回の依存解決に失敗したため、SwiftPM キャッシュを掃除して再試行します。"
            clean_spm_state
            "${resolve_cmd[@]}"
          fi

      - name: Build iOS app (unsigned)
        shell: bash
        env:
          SCHEME: ${{ inputs.scheme }}
          CONFIGURATION: ${{ inputs.configuration }}
        run: |
          set -euo pipefail
          DERIVED_DATA="${RUNNER_TEMP}/DerivedData"
          SOURCE_PACKAGES="${RUNNER_TEMP}/SourcePackages"
          PACKAGE_CACHE="${RUNNER_TEMP}/PackageCache"
          PRODUCTS_DIR="${DERIVED_DATA}/Build/Products/${CONFIGURATION}-iphoneos"
          LOG_FILE="${RUNNER_TEMP}/${SCHEME}-${CONFIGURATION}-build.log"
          XCODE_VERSION_RAW="$(xcodebuild -version)"
          XCODE_VERSION="${XCODE_VERSION_RAW#Xcode }"
          XCODE_VERSION="${XCODE_VERSION%%$'\n'*}"
          XCODE_MAJOR="${XCODE_VERSION%%.*}"
          EXTRA_BUILD_SETTINGS=()

          if ! [[ "${XCODE_MAJOR}" =~ ^[0-9]+$ ]]; then
            echo "Xcode major version の解析に失敗しました: ${XCODE_VERSION}"
            XCODE_MAJOR=0
          fi

          if [ "${SCHEME}" = "LLMEval" ] && [ "${XCODE_MAJOR}" -lt 26 ]; then
            echo "Xcode ${XCODE_VERSION} では AppIcon.icon が未対応のため、CI ビルドでは AppIcon 指定を無効化します。"
            EXTRA_BUILD_SETTINGS+=(ASSETCATALOG_COMPILER_APPICON_NAME=)
          fi

          rm -rf "${DERIVED_DATA}"

          xcodebuild clean build \
            -project mlx-swift-examples.xcodeproj \
            -scheme "${SCHEME}" \
            -configuration "${CONFIGURATION}" \
            -destination "generic/platform=iOS" \
            -derivedDataPath "${DERIVED_DATA}" \
            -clonedSourcePackagesDirPath "${SOURCE_PACKAGES}" \
            -packageCachePath "${PACKAGE_CACHE}" \
            -disablePackageRepositoryCache \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            "${EXTRA_BUILD_SETTINGS[@]}" \
            | tee "${LOG_FILE}"

          APP_PATH="$(find "${PRODUCTS_DIR}" -maxdepth 1 -type d -name '*.app' | head -n 1)"
          if [ -z "${APP_PATH}" ]; then
            echo "app bundle が見つかりませんでした: ${PRODUCTS_DIR}"
            exit 1
          fi

          PAYLOAD_DIR="${RUNNER_TEMP}/Payload"
          mkdir -p "${PAYLOAD_DIR}"
          rm -rf "${PAYLOAD_DIR}"/*.app
          cp -R "${APP_PATH}" "${PAYLOAD_DIR}/"

          IPA_PATH="${RUNNER_TEMP}/${SCHEME}-${CONFIGURATION}-unsigned.ipa"
          rm -f "${IPA_PATH}"
          (
            cd "${RUNNER_TEMP}"
            /usr/bin/zip -qry "${IPA_PATH}" Payload
          )

          echo "IPA_PATH=${IPA_PATH}" >> "${GITHUB_ENV}"
          echo "LOG_FILE=${LOG_FILE}" >> "${GITHUB_ENV}"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.scheme }}-${{ inputs.configuration }}-unsigned-ipa
          path: |
            ${{ env.IPA_PATH }}
            ${{ env.LOG_FILE }}
          if-no-files-found: error
          retention-days: 14
